<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Genomic Intelligence Platform</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: radial-gradient(circle at top, #0f2027, #000);
    color: white;
    font-family: 'Segoe UI';
}

.card-glass {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border-radius: 15px;
    padding: 25px;
}

textarea {
    background: #111;
    color: white;
    border: 1px solid #333;
}

.btn-custom {
    background: linear-gradient(45deg, #00eaff, #0072ff);
    border: none;
}
</style>
</head>

<body>

<div class="container mt-5">
<div class="row justify-content-center">

<div class="col-md-8">
<div class="card-glass">

<h2 class="text-center mb-4">🧬 Genomic Analyzer</h2>

<textarea id="ref" class="form-control mb-2" placeholder="Reference DNA"></textarea>
<textarea id="sample" class="form-control mb-2" placeholder="Sample DNA"></textarea>

<input type="file" id="fileInput" class="form-control mb-2">

<button class="btn btn-custom w-100 mb-2" onclick="upload()">Upload File</button>
<button class="btn btn-custom w-100 mb-2" onclick="analyze()">Run Analysis</button>

<h5 id="count"></h5>
<h5 id="ai"></h5>

<table class="table table-dark text-center" id="result"></table>

<div id="plot"></div>

</div>
</div>

</div>
</div>

<script>
function upload(){
    let fileInput = document.getElementById("fileInput");
    let file = fileInput.files[0];

    if (!file) {
        alert('Please select a file first.');
        return;
    }

    let formData = new FormData();
    formData.append("file", file);

    fetch('/upload', {method:'POST', body:formData})
    .then(res=>res.json())
    .then(data=>{
        if (data.error) {
            alert(data.error);
            return;
        }
        document.getElementById("sample").value = data.sequence;
    })
    .catch(err=>{
        alert('Upload failed: ' + err.message);
    });
}

function analyze(){
    const reference = document.getElementById("ref").value;
    const sample = document.getElementById("sample").value;

    document.getElementById("count").innerText = 'Analyzing...';
    document.getElementById("ai").innerText = '';
    document.getElementById("result").innerHTML = '';
    document.getElementById("plot").innerHTML = '';

    fetch('/analyze',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({reference, sample})
    })
    .then(res=>res.json().then(data=>({status: res.status, body: data})))
    .then(result=>{
        if (result.status !== 200) {
            throw new Error(result.body.error || 'Analysis error');
        }

        document.getElementById("count").innerText = "Mutations: " + result.body.count;

        let table = "<tr><th>Pos</th><th>Ref</th><th>Alt</th><th>Type</th></tr>";
        result.body.variants.forEach(v=>{
            table += `<tr>
                <td>${v.position}</td>
                <td>${v.ref}</td>
                <td>${v.alt}</td>
                <td>${v.type}</td>
            </tr>`;
        });

        document.getElementById("result").innerHTML = table;

        if(result.body.plot){
            document.getElementById("plot").innerHTML = result.body.plot;
        }

        return fetch('/ai',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({count: result.body.count})
        });
    })
    .then(res=>res.json())
    .then(ai=>{
        if (ai.result) {
            document.getElementById("ai").innerText = ai.result;
        }
    })
    .catch(err=>{
        document.getElementById("count").innerText = 'Error';
        document.getElementById("ai").innerText = err.message;
    });
}
</script>

</body>
</html>
